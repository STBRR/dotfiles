[colors.primary]
background = "#282828"
foreground = "#ebdbb2"

[colors.normal]
black   = "#282828"
red     = "#cc241d"
green   = "#98971a"
yellow  = "#d79921"
blue    = "#458588"
magenta = "#b16286"
cyan    = "#689d6a"
white   = "#a89984"

[colors.bright]
black   = "#928374"
red     = "#fb4934"
green   = "#b8bb26"
yellow  = "#fabd2f"
blue    = "#83a598"
magenta = "#d3869b"
cyan    = "#8ec07c"
white   = "#ebdbb2"

[font]
size = 10

[font.normal]
family = "Ioskeley Mono"
style = "Normal"

[font.bold]
family = "Ioskeley Mono"
#family = "Agave Nerd Font"
style = "Bold"

[window]
opacity = 0.98

[window.padding]
x = 5
y = 5

[env]
TERM = "xterm-256color"

[scrolling]
history = 9500
multiplier = 5

[general]
live_config_reload = true




