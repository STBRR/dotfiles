command=/usr/share/i3blocks/$BLOCK_NAME
separator_block_width=15
markup=none
color=#ebdbb2

[disk]
label=💾
instance=/dev/sda1
interval=30
color=#d79921

[iface]
instance=eth0
label=NAT:
