command=~/.local/libexec/$BLOCK_NAME
separator_block_width=15
markup=none
color=#ebdbb2

[disk]
label=💾
instance=/dev/sda1
interval=30
color=#d79921

[iface]
instance=eth0
label=LAN:
color=#458588
interval=10
separator=true

[iface]
instance=tun0
label=VPN:
color=#98971a
interval=1
separator=true

[time]
command=date '+%A %d-%m-%Y %H:%M%p'
interval=5
color=#ebdbb2
